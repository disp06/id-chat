<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ID Secret Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; max-width: 800px; margin: auto; }
    .message-cipher { font-family: monospace; word-break: break-all; margin-top: 4px; }
    #messages-container { max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>ID Secret Chat</h1>
  <div id="setup-panel" class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Room ID (6 chars)</label>
        <input type="text" id="room-id" class="form-control" placeholder="Will be generated">
        <button id="gen-room-id" class="btn btn-sm btn-secondary mt-1">Generate</button>
      </div>
      <div class="mb-3">
        <label class="form-label">Secret (base64url, 32 bytes)</label>
        <input type="text" id="secret" class="form-control" placeholder="Will be generated">
        <button id="gen-secret" class="btn btn-sm btn-secondary mt-1">Generate</button>
      </div>
      <!-- Password optional (future) -->
      <div class="mb-3">
        <label class="form-label">Password (optional)</label>
        <input type="password" id="password" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Your User ID</label>
        <input type="text" id="user-id" class="form-control" placeholder="Random">
        <button id="gen-user-id" class="btn btn-sm btn-secondary mt-1">Generate</button>
      </div>
      <button id="create-room" class="btn btn-primary">Create Room</button>
      <button id="join-room" class="btn btn-success">Join Room</button>
    </div>
  </div>

  <div id="chat-panel" class="card d-none">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>Room: <strong id="chat-room-id"></strong></span>
      <span class="badge bg-secondary" id="my-user-id"></span>
      <button id="leave-btn" class="btn btn-sm btn-outline-danger">Leave</button>
    </div>
    <div class="card-body" id="messages-container">
      <!-- messages --> 
    </div>
    <div class="card-footer">
      <div class="input-group">
        <input type="text" id="message-input" class="form-control" placeholder="Type a message...">
        <button id="send-btn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
